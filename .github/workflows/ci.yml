name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static compile check
        run: python -m py_compile *.py

      - name: Smoke config check
        run: |
          test -f config.example.json
          python - << 'PY'
          import json
          with open('config.example.json') as f:
              cfg = json.load(f)
          assert 'trading' in cfg and 'runtime' in cfg
          print('config.example.json OK')
          PY
